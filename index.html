<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>BotC Cheat Sheet</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
header {
  position: sticky; top: 0; z-index: 10;
  background: #16213e;
  padding: 12px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
h1 {
  font-size: 18px;
  color: #c41e3a;
  margin-bottom: 10px;
  text-align: center;
  letter-spacing: 1px;
}
.search-box {
  display: flex;
  margin-bottom: 10px;
}
.search-box input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid #333;
  border-radius: 8px;
  background: #0f0f23;
  color: #e0e0e0;
  font-size: 16px;
  outline: none;
}
.search-box input:focus { border-color: #c41e3a; }
.search-box input::placeholder { color: #666; }
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 8px;
}
.filter-group {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 8px;
  width: 100%;
}
.filter-group:first-child { margin-bottom: 4px; }
label.chip {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  transition: opacity 0.15s;
  border: 1.5px solid transparent;
}
label.chip input { display: none; }
label.chip.off { opacity: 0.35; }
/* Set chips */
.chip-tb { background: #2a1a1a; color: #e8a87c; border-color: #e8a87c; }
.chip-sv { background: #1a1a2e; color: #b088f9; border-color: #b088f9; }
.chip-bmr { background: #1a2a1a; color: #7fcd91; border-color: #7fcd91; }
.chip-exp { background: #2a2a1a; color: #d4c95c; border-color: #d4c95c; }
/* Faction chips */
.chip-townsfolk { background: #1a2440; color: #5b9bd5; border-color: #5b9bd5; }
.chip-outsider { background: #1a3030; color: #45b8ac; border-color: #45b8ac; }
.chip-minion { background: #301a1a; color: #e06666; border-color: #e06666; }
.chip-demon { background: #3a0a0a; color: #c41e3a; border-color: #c41e3a; }

#results { padding: 8px 12px; }
.set-header {
  font-size: 14px;
  font-weight: 700;
  padding: 10px 4px 4px;
  letter-spacing: 0.5px;
}
.set-tb .set-header { color: #e8a87c; }
.set-sv .set-header { color: #b088f9; }
.set-bmr .set-header { color: #7fcd91; }
.set-exp .set-header { color: #d4c95c; }

.faction-header {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 8px 4px 4px;
}
.faction-townsfolk .faction-header { color: #5b9bd5; }
.faction-outsider .faction-header { color: #45b8ac; }
.faction-minion .faction-header { color: #e06666; }
.faction-demon .faction-header { color: #c41e3a; }

.card {
  padding: 8px 10px;
  margin: 3px 0;
  border-radius: 8px;
  border-left: 3px solid;
}
.card-townsfolk { background: #101a2a; border-color: #5b9bd5; }
.card-outsider { background: #0f1f1f; border-color: #45b8ac; }
.card-minion { background: #1f0f0f; border-color: #e06666; }
.card-demon { background: #200808; border-color: #c41e3a; }

.card .name {
  font-weight: 700;
  font-size: 14px;
}
.card-townsfolk .name { color: #5b9bd5; }
.card-outsider .name { color: #45b8ac; }
.card-minion .name { color: #e06666; }
.card-demon .name { color: #c41e3a; }

.card .ability {
  font-size: 13px;
  color: #bbb;
  margin-top: 2px;
  line-height: 1.4;
}
.card .ability em {
  font-style: normal;
  color: #888;
}
.no-results {
  text-align: center;
  color: #666;
  padding: 40px 20px;
  font-size: 15px;
}
.count {
  text-align: center;
  color: #555;
  font-size: 12px;
  padding: 4px;
}
</style>
</head>
<body>
<header>
  <h1>BLOOD ON THE CLOCKTOWER</h1>
  <div class="search-box">
    <input type="text" id="search" placeholder="Search characters..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
  <div class="filters">
    <div class="filter-group" id="set-filters"></div>
    <div class="filter-group" id="faction-filters"></div>
  </div>
</header>
<div id="results"></div>

  {n:"Lil' Monsta",a:"Each night, Minions choose who babysits Lil' Monsta & 'is the Demon'. Each night*, a player might die. [+1 Minion]",s:"exp",f:"demon"},
  {n:"Lleech",a:"Each night*, choose a player: they die. You start by choosing a player: they are poisoned. You die if & only if they are dead.",s:"exp",f:"demon"},
  {n:"Lord of Typhon",a:"Each night*, choose a player: they die. [Evil characters are in a line. You are in the middle. +1 Minion. -? to +? Outsiders]",s:"exp",f:"demon"},
  {n:"Ojo",a:"Each night*, choose a character: they die. If they are not in play, the Storyteller chooses who dies.",s:"exp",f:"demon"},
  {n:"Riot",a:"On day 3, Minions become Riot & nominees die but nominate an alive player immediately. This must happen.",s:"exp",f:"demon"},
  {n:"Yaggababble",a:"You start knowing a secret phrase. For each time you said it publicly today, a player might die.",s:"exp",f:"demon"},
];

const SETS = [
  {id:'tb', label:'Trouble Brewing'},
  {id:'sv', label:'Sects & Violets'},
  {id:'bmr', label:'Bad Moon Rising'},
  {id:'exp', label:'Experimental'},
];
const FACTIONS = [
  {id:'townsfolk', label:'Townsfolk'},
  {id:'outsider', label:'Outsiders'},
  {id:'minion', label:'Minions'},
  {id:'demon', label:'Demons'},
];

const SET_LABELS = {tb:'Trouble Brewing',sv:'Sects & Violets',bmr:'Bad Moon Rising',exp:'Experimental'};
const FACTION_LABELS = {townsfolk:'Townsfolk',outsider:'Outsiders',minion:'Minions',demon:'Demons'};
const FACTION_ORDER = ['townsfolk','outsider','minion','demon'];
const SET_ORDER = ['tb','sv','bmr','exp'];

const state = {
  sets: new Set(['tb','sv','bmr','exp']),
  factions: new Set(['townsfolk','outsider','minion','demon']),
  search: ''
};

function createChips() {
  const sf = document.getElementById('set-filters');
  const ff = document.getElementById('faction-filters');
  SETS.forEach(s => {
    const l = document.createElement('label');
    l.className = `chip chip-${s.id}`;
    l.innerHTML = `<input type="checkbox" checked data-type="set" data-id="${s.id}">${s.label}`;
    sf.appendChild(l);
  });
  FACTIONS.forEach(f => {
    const l = document.createElement('label');
    l.className = `chip chip-${f.id}`;
    l.innerHTML = `<input type="checkbox" checked data-type="faction" data-id="${f.id}">${f.label}`;
    ff.appendChild(l);
  });
}

function render() {
  const r = document.getElementById('results');
  const q = state.search.toLowerCase();
  const filtered = CHARACTERS.filter(c =>
    state.sets.has(c.s) && state.factions.has(c.f) &&
    (!q || c.n.toLowerCase().includes(q))
  );

  if (!filtered.length) {
    r.innerHTML = '<div class="no-results">No characters match your filters.</div>';
    return;
  }

  let html = '';
  // Group by set, then faction
  for (const s of SET_ORDER) {
    if (!state.sets.has(s)) continue;
    const setChars = filtered.filter(c => c.s === s);
    if (!setChars.length) continue;
    html += `<div class="set-${s}"><div class="set-header">${SET_LABELS[s]}</div>`;
    for (const f of FACTION_ORDER) {
      if (!state.factions.has(f)) continue;
      const fChars = setChars.filter(c => c.f === f);
      if (!fChars.length) continue;
      html += `<div class="faction-${f}"><div class="faction-header">${FACTION_LABELS[f]}</div>`;
      for (const c of fChars) {
        // Highlight setup text in brackets
        const ability = c.a.replace(/(\[.*?\])/g, '<em>$1</em>');
        html += `<div class="card card-${c.f}"><div class="name">${highlight(c.n, q)}</div><div class="ability">${ability}</div></div>`;
      }
      html += '</div>';
    }
    html += '</div>';
  }
  html += `<div class="count">${filtered.length} character${filtered.length===1?'':'s'}</div>`;
  r.innerHTML = html;
}

function highlight(text, q) {
  if (!q) return text;
  const i = text.toLowerCase().indexOf(q);
  if (i < 0) return text;
  return text.slice(0, i) + '<mark style="background:#c41e3a44;color:inherit;border-radius:2px;padding:0 1px">' + text.slice(i, i + q.length) + '</mark>' + text.slice(i + q.length);
}

document.addEventListener('click', e => {
  const input = e.target.closest('label.chip')?.querySelector('input');
  if (!input) return;
  const {type, id} = input.dataset;
  const set = type === 'set' ? state.sets : state.factions;
  // Will toggle after this event, so checked = current state before toggle
  if (input.checked) set.delete(id); else set.add(id);
  input.closest('label').classList.toggle('off', input.checked);
  render();
});

document.getElementById('search').addEventListener('input', e => {
  state.search = e.target.value;
  render();
});

createChips();
render();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
